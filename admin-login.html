<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoBITE Admin Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login">
    <div class="title">EcoBITE</div>
    <h2>Admin Login</h2>
    
    <div class="form-group">
        <label>Admin Username</label>
        <input type="text" id="adminUsername" placeholder="Enter admin username">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPassword" placeholder="Enter password">
    </div>

    <button class="login-button" onclick="adminLogin()">Login</button>
    <button class="create-button" onclick="goToCustomerLogin()">Customer Login</button>

    <p id="message"></p>
</div>

<script src="script.js"></script>
<script>
    function adminLogin(){
        const username = document.getElementById("adminUsername").value;
        const password = document.getElementById("adminPassword").value;
        const message = document.getElementById("message");

        // Default admin credentials
        const adminUsername = "admin";
        const adminPassword = "admin123";

        if(username === "" || password === ""){
            message.style.color = "red";
            message.innerHTML = "Please fill all fields";
            return;
        }

        if(username === adminUsername && password === adminPassword){
            message.style.color = "green";
            message.innerHTML = "Login successful!";
            localStorage.setItem("isAdminLoggedIn", "true");
            setTimeout(function(){
                window.location.href = "admin-dashboard.html";
            }, 1000);
        } else {
            message.style.color = "red";
            message.innerHTML = "Invalid username or password";
        }
    }

    function goToCustomerLogin(){
        window.location.href = "index.html";
    }
</script>
</body>
</html>
