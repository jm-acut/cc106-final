<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product 3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/765/765613.png" alt="EcoBITE logo">
        <h1>EcoBITE</h1>
    </div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a id="cartLink" href="cart.html">Cart</a>
    </div>
    <form class="search-block" action="#" onsubmit="return false;">
        <input type="text" placeholder="Search">
        <button type="submit">🔍</button>
    </form>
</div>

<div class="product-container">
    <img class="product-image" src="https://images.unsplash.com/photo-1490645935967-10de6ba17061" alt="Cooked Food On A Plate">
    <div class="product-details" data-product-id="product3" data-product-name="Cooked Food On A Plate" data-product-price="390" data-product-image="https://images.unsplash.com/photo-1490645935967-10de6ba17061">
        <div class="product-title">Cooked Food On A Plate</div>
        <div class="price">₱390</div>
        <div class="description">A hearty cooked meal served on a plate with fresh greens and healthy ingredients for a balanced diet.</div>
        <div class="quantity">
            <button onclick="decrease()">−</button>
            <span id="count">1</span>
            <button onclick="increase()">+</button>
        </div>
        <button class="add-btn" onclick="addToCart()">Add to cart</button>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
