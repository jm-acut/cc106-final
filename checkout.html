<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoBITE Checkout</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/765/765613.png" alt="EcoBITE logo">
        <h1>EcoBITE</h1>
    </div>
    <div class="nav-links">
        <a href="home.html">Home</a>
        <a id="cartLink" href="cart.html">Cart</a>
    </div>
    <form class="search-block" action="#" onsubmit="return false;">
        <input type="text" placeholder="Search">
        <button type="submit">🔍</button>
    </form>
</div>

<div class="container">
    <div class="checkout-wrapper">
        <div class="checkout-left">
            <div class="title">Order Summary</div>
            <div id="checkoutItems" class="checkout-items"></div>
            <div class="order-total">
                <h3>Total: ₱<span id="checkoutTotal">0.00</span></h3>
            </div>
        </div>

        <div class="checkout-right">
            <div class="title">Delivery Information</div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="emailAddress" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phoneNumber" placeholder="Enter your phone number">
            </div>

            <div class="form-group">
                <label>Delivery Address</label>
                <textarea id="deliveryAddress" placeholder="Enter your complete delivery address" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label>Delivery Instructions (Optional)</label>
                <textarea id="deliveryInstructions" placeholder="Any special instructions?" rows="3"></textarea>
            </div>

            <div class="title" style="margin-top: 30px;">Payment Method</div>
            
            <div class="payment-options">
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="cod" checked>
                    <span>Cash on Delivery (COD)</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="card">
                    <span>Credit/Debit Card</span>
                </label>
                <label class="payment-option">
                    <input type="radio" name="paymentMethod" value="gcash">
                    <span>GCash</span>
                </label>
            </div>

            <div id="cardDetails" style="display:none; margin-top: 20px;">
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Expiry Date</label>
                        <input type="text" id="cardExpiry" placeholder="MM/YY">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="text" id="cardCVV" placeholder="123">
                    </div>
                </div>
            </div>

            <button class="add-btn" style="width: 100%; margin-top: 30px;" onclick="placeOrder()">Place Order</button>
            <a href="cart.html" style="display: block; text-align: center; margin-top: 15px; color: #4d2d2e;">← Back to Cart</a>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
        radio.addEventListener('change', function() {
            const cardDetails = document.getElementById('cardDetails');
            cardDetails.style.display = this.value === 'card' ? 'block' : 'none';
        });
    });

    window.addEventListener('DOMContentLoaded', function() {
        displayCheckoutItems();
    });

    function displayCheckoutItems() {
        const checkoutItems = document.getElementById('checkoutItems');
        const checkoutTotal = document.getElementById('checkoutTotal');
        
        const cart = getCart();
        if (cart.length === 0) {
            checkoutItems.innerHTML = "<p>Your cart is empty. <a href='home.html'>Continue shopping</a></p>";
            return;
        }

        checkoutItems.innerHTML = '';
        let total = 0;

        cart.forEach(item => {
            const subtotal = item.price * item.quantity;
            total += subtotal;

            const itemElement = document.createElement('div');
            itemElement.className = 'checkout-item';
            itemElement.innerHTML = `
                <div>
                    <h4>${item.name}</h4>
                    <p>${item.quantity} × ₱${item.price.toFixed(2)} = ₱${subtotal.toFixed(2)}</p>
                </div>
            `;
            checkoutItems.appendChild(itemElement);
        });

        checkoutTotal.innerText = total.toFixed(2);
    }
</script>
</body>
</html>
