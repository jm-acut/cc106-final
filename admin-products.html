<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoBITE Admin - Manage Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="admin-navbar">
    <div class="logo">
        <img src="https://cdn-icons-png.flaticon.com/512/765/765613.png" alt="EcoBITE logo">
        <h1>EcoBITE Admin</h1>
    </div>
    <div class="nav-links">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="admin-products.html">Products</a>
        <a href="admin-orders.html">Orders</a>
        <a href="#" onclick="adminLogout()">Logout</a>
    </div>
</div>

<div class="admin-container">
    <div class="admin-header">
        <h1>Product Management</h1>
        <button class="add-btn" onclick="openAddProductModal()">+ Add New Product</button>
    </div>

    <div class="dashboard-section">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Product ID</th>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productsTable">
                <tr>
                    <td colspan="6">Loading products...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit Product Modal -->
<div id="productModal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close" onclick="closeProductModal()">&times;</span>
        <h2 id="modalTitle">Add New Product</h2>
        
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" placeholder="Enter product name">
        </div>

        <div class="form-group">
            <label>Price (₱)</label>
            <input type="number" id="productPrice" placeholder="Enter price" step="0.01">
        </div>

        <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" id="productStock" placeholder="Enter stock quantity">
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea id="productDescription" placeholder="Enter product description" rows="4"></textarea>
        </div>

        <button class="add-btn" onclick="saveProduct()" style="width: 100%; margin-top: 20px;">Save Product</button>
    </div>
</div>

<script src="script.js"></script>
<script>
    window.addEventListener('DOMContentLoaded', function(){
        checkAdminAccess();
        loadProducts();
    });

    function checkAdminAccess(){
        const isAdmin = localStorage.getItem('isAdminLoggedIn');
        if(!isAdmin){
            window.location.href = 'admin-login.html';
        }
    }

    function loadProducts(){
        const products = JSON.parse(localStorage.getItem('ecoBiteProducts')) || getDefaultProducts();
        const tbody = document.getElementById('productsTable');
        tbody.innerHTML = '';

        if(products.length === 0){
            tbody.innerHTML = '<tr><td colspan="6">No products found</td></tr>';
            return;
        }

        products.forEach(product => {
            const row = document.createElement('tr');
            const status = product.quantity > 0 ? 'In Stock' : 'Out of Stock';
            row.innerHTML = `
                <td>${product.id}</td>
                <td>${product.name}</td>
                <td>₱${product.price.toFixed(2)}</td>
                <td>${product.quantity}</td>
                <td><span class="status-badge ${product.quantity > 0 ? 'in-stock' : 'out-of-stock'}">${status}</span></td>
                <td>
                    <button class="edit-btn" onclick="editProduct('${product.id}')">Edit</button>
                    <button class="delete-btn" onclick="deleteProduct('${product.id}')">Delete</button>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function openAddProductModal(){
        document.getElementById('modalTitle').innerText = 'Add New Product';
        document.getElementById('productName').value = '';
        document.getElementById('productPrice').value = '';
        document.getElementById('productStock').value = '';
        document.getElementById('productDescription').value = '';
        document.getElementById('productModal').style.display = 'block';
        window.currentEditId = null;
    }

    function closeProductModal(){
        document.getElementById('productModal').style.display = 'none';
    }

    function saveProduct(){
        const name = document.getElementById('productName').value;
        const price = parseFloat(document.getElementById('productPrice').value);
        const quantity = parseInt(document.getElementById('productStock').value);
        const description = document.getElementById('productDescription').value;

        if(!name || !price || !quantity){
            alert('Please fill all required fields');
            return;
        }

        let products = JSON.parse(localStorage.getItem('ecoBiteProducts')) || getDefaultProducts();

        if(window.currentEditId){
            const product = products.find(p => p.id === window.currentEditId);
            if(product){
                product.name = name;
                product.price = price;
                product.quantity = quantity;
                product.description = description;
            }
        } else {
            const newId = 'product' + (products.length + 1);
            products.push({
                id: newId,
                name,
                price,
                quantity,
                description
            });
        }

        localStorage.setItem('ecoBiteProducts', JSON.stringify(products));
        closeProductModal();
        loadProducts();
        alert('Product saved successfully!');
    }

    function editProduct(productId){
        const products = JSON.parse(localStorage.getItem('ecoBiteProducts')) || getDefaultProducts();
        const product = products.find(p => p.id === productId);

        if(product){
            document.getElementById('modalTitle').innerText = 'Edit Product';
            document.getElementById('productName').value = product.name;
            document.getElementById('productPrice').value = product.price;
            document.getElementById('productStock').value = product.quantity;
            document.getElementById('productDescription').value = product.description || '';
            window.currentEditId = productId;
            document.getElementById('productModal').style.display = 'block';
        }
    }

    function deleteProduct(productId){
        if(confirm('Are you sure you want to delete this product?')){
            let products = JSON.parse(localStorage.getItem('ecoBiteProducts')) || getDefaultProducts();
            products = products.filter(p => p.id !== productId);
            localStorage.setItem('ecoBiteProducts', JSON.stringify(products));
            loadProducts();
            alert('Product deleted successfully!');
        }
    }

    function adminLogout(){
        localStorage.removeItem('isAdminLoggedIn');
        window.location.href = 'admin-login.html';
    }

    function getDefaultProducts(){
        return [
            { id: 'product1', name: 'Salad with Avocado and Sesame Seeds', price: 420, quantity: 50, description: 'A creamy avocado salad with sesame seeds, fresh greens, and a light dressing.' },
            { id: 'product2', name: 'Salad in the Bowl', price: 390, quantity: 45, description: 'Fresh vegetable bowl with healthy ingredients.' },
            { id: 'product3', name: 'Cooked Food On A Plate', price: 390, quantity: 30, description: 'A hearty cooked meal served on a plate with fresh greens and healthy ingredients for a balanced diet.' },
            { id: 'product4', name: 'Salad in the Bowl', price: 190, quantity: 60, description: 'A light, nutritious salad bowl made with fresh greens and wholesome flavors.' }
        ];
    }
</script>
</body>
</html>
